# PR時に静的解析・フォーマットチェック・テストを実行するワークフロー。
#
# トリガー：main へのプルリクエスト（作成・更新）
# 実行内容：build_runner / dart analyze / dart format / flutter test
# 失敗条件：error・warning レベルの解析問題・フォーマット崩れ・テスト失敗のいずれかがある場合
name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'

jobs:
  analyze_and_format:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (FVM)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvm/fvm_config.json
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # *.g.dart は .gitignore で管理対象外のため CI 上で生成する
      # app_database.g.dart と list_tab_test.mocks.dart が対象
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # --fatal-warnings は外す
      # ローカルと CI で info の内容が異なるケースがあるため
      # error・warning のみを失敗条件にする
      - name: dart analyze
        run: dart analyze lib/

      - name: dart format check
        run: dart format lib/ --output=none --set-exit-if-changed

      - name: flutter test
        run: flutter test --reporter expanded