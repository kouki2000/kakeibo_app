# PR時に静的解析とフォーマットチェックを実行するワークフロー。
#
# トリガー：feature/* ブランチから develop へのプルリクエスト（作成・更新）
# 実行内容：dart analyze / dart format --output=none --set-exit-if-changed
# 失敗条件：解析エラーが1件でもある、またはフォーマットが崩れているファイルがある
name: CI

on:
  pull_request:
    branches:
      - develop     # develop へのPRだけを対象にする
    paths:
      - 'lib/**'    # lib/ 配下のファイルが変更されたときだけ実行する
      - 'test/**'   # test/ 配下が変更されたときも実行する
      - 'pubspec.yaml'

jobs:
  analyze_and_format:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリをチェックアウトする
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Flutter をセットアップする
      #    .fvm/fvm_config.json に記載のバージョンを自動で読む
      - name: Setup Flutter (FVM)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvm/fvm_config.json
          cache: true

      # 3. 依存パッケージをインストールする
      - name: Install dependencies
        run: flutter pub get

      # 4. 静的解析を実行する
      #    警告（warning）・エラー（error）が1件でもあればCIを失敗させる
      - name: dart analyze
        run: dart analyze lib/ --fatal-warnings

      # 5. フォーマットチェックを実行する
      #    --output=none  : ファイルを書き換えず、対象ファイル名だけ標準出力する
      #    --set-exit-if-changed : フォーマットが崩れているファイルがあれば終了コード1を返す
      - name: dart format check
        run: dart format lib/ --output=none --set-exit-if-changed